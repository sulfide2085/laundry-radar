<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>洗烘雷达</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='14' y='8' width='36' height='48' rx='6' fill='%23f7f8f3' stroke='%231d2523' stroke-width='4'/%3E%3Ccircle cx='32' cy='34' r='13' fill='%23dceff1' stroke='%231d2523' stroke-width='4'/%3E%3Ccircle cx='23' cy='18' r='3' fill='%2321a86b'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css?v=desktop-grid-20260707">
  </head>
  <body>
    <a class="skipLink" href="#siteGrid">跳到设备列表</a>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>洗烘雷达</h1>
          <p id="updatedAt">未刷新</p>
        </div>
        <form id="authForm" class="auth">
          <div id="authStatus" class="authStatus" aria-live="polite">
            <span>授权</span>
            <strong>检测中</strong>
          </div>
          <label class="tokenField compact">
            <span id="authMode">本机授权</span>
            <input id="authToken" name="authToken" type="password" autocomplete="off" placeholder="留空自动使用本机授权">
          </label>
          <button class="iconButton primary" type="submit" title="刷新状态" aria-label="刷新状态">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 12a9 9 0 0 1-15.1 6.6"></path>
              <path d="M3 12A9 9 0 0 1 18.1 5.4"></path>
              <path d="M18 2v4h-4"></path>
              <path d="M6 22v-4h4"></path>
            </svg>
            <span>刷新</span>
          </button>
        </form>
      </header>

      <section class="controls" aria-label="筛选">
        <div class="filterGroups">
          <div class="segmented" role="group" aria-label="位置筛选">
            <button class="segment active" data-site-filter="all" aria-pressed="true" type="button">全部</button>
            <button class="segment" data-site-filter="hongdou" aria-pressed="false" type="button">红豆斋</button>
            <button class="segment" data-site-filter="basement" aria-pressed="false" type="button">负一层</button>
          </div>
          <div class="segmented" role="group" aria-label="状态筛选">
            <button class="segment active" data-state-filter="all" aria-pressed="true" type="button">全部</button>
            <button class="segment" data-state-filter="free" aria-pressed="false" type="button">空闲</button>
            <button class="segment" data-state-filter="busy" aria-pressed="false" type="button">运作</button>
          </div>
        </div>
        <div class="settingsGroup">
          <button id="themeToggle" class="toggleButton" type="button" aria-pressed="false">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3a6 6 0 0 0 9 7.2A9 9 0 1 1 12 3Z"></path>
            </svg>
            <span>夜间模式</span>
          </button>
          <button id="autoRefresh" class="toggleButton" type="button" aria-pressed="false">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 12a9 9 0 0 1-15.1 6.6"></path>
              <path d="M3 12A9 9 0 0 1 18.1 5.4"></path>
              <path d="M18 2v4h-4"></path>
              <path d="M12 7v5l3 2"></path>
            </svg>
            <span>自动刷新（5分钟）</span>
          </button>
        </div>
      </section>

      <section id="overviewBar" class="overviewBar" aria-label="总览"></section>
      <section id="summaryGrid" class="summaryGrid" aria-label="概览"></section>
      <section id="siteGrid" class="siteGrid" aria-label="设备状态"></section>
      <div id="message" class="message" role="status" aria-live="polite"></div>
      <button id="scrollTopButton" class="topButton" type="button" title="回到顶部" aria-label="回到顶部">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 19V5"></path>
          <path d="m5 12 7-7 7 7"></path>
        </svg>
        <span>回到顶部</span>
      </button>
    </main>

    <script src="app.js?v=desktop-grid-20260707" type="module"></script>
  </body>
</html>
